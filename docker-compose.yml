networks:
  openclaw-internal:
    driver: bridge
    internal: true

services:
  gateway:
    build:
      context: /opt/openclaw-stack/gateway
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:18789"
    environment:
      # Explicit allow-list: ONLY the bridge token is ever forwarded
      # into the gateway container. env_file would inject every line
      # of bridge/.env as an env var, which is a footgun if that file
      # ever grows. See HARDENING.md note (L4).
      BRIDGE_TOKEN: ${BRIDGE_TOKEN}
    volumes:
      - /opt/openclaw-stack/gateway/config:/home/node/.openclaw
      - /opt/openclaw-stack/gateway/data:/app/data
      - /opt/openclaw-stack/gateway/logs:/app/logs
    networks:
      - default
      - openclaw-internal

  bridge:
    build:
      context: /opt/openclaw-stack/bridge
      dockerfile: Dockerfile
    image: openclaw-bridge:local
    container_name: openclaw-bridge
    restart: unless-stopped
    environment:
      # Explicit allow-list; see gateway.environment for rationale.
      BRIDGE_TOKEN: ${BRIDGE_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/openclaw-stack/bridge/scripts/run-codex.sh:/scripts/run-codex.sh:ro
      - /opt/openclaw-stack/deploy-runner/scripts/deploy-staging.sh:/scripts/deploy-staging.sh:ro
      - /opt/openclaw-stack/db-query-runner/scripts/query-readonly.sh:/scripts/query-readonly.sh:ro
    networks:
      - openclaw-internal
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  codex-worker:
    build:
      context: /opt/openclaw-stack/codex-worker
      dockerfile: Dockerfile
    image: openclaw-codex-worker:local
    container_name: openclaw-codex-worker
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    env_file:
      - /opt/openclaw-stack/codex-worker/.env
    volumes:
      - /opt/openclaw-stack/codex-worker/workspace:/workspace
      - /opt/openclaw-stack/codex-worker/tmp:/tmp

  deploy-runner:
    image: alpine:3.20
    container_name: openclaw-deploy-runner
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - /opt/openclaw-stack/deploy-runner/scripts:/app/scripts
      - /opt/openclaw-stack/deploy-runner/artifacts:/app/artifacts
      - /opt/openclaw-stack/deploy-runner/logs:/app/logs

  db-query-runner:
    image: alpine:3.20
    container_name: openclaw-db-query-runner
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - /opt/openclaw-stack/db-query-runner/scripts:/app/scripts
      - /opt/openclaw-stack/db-query-runner/results:/app/results
      - /opt/openclaw-stack/db-query-runner/logs:/app/logs
