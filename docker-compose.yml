networks:
  openclaw-internal:
    driver: bridge
    internal: true

services:
  gateway:
    build:
      context: /opt/openclaw-stack/gateway
      dockerfile: Dockerfile
    image: openclaw-gateway:local
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:18789"
    environment:
      # Explicit allow-list: only named variables are ever forwarded
      # into the gateway container. env_file would inject every line
      # of the underlying file, which is a footgun if the file ever
      # grows. See HARDENING.md note (L4).
      BRIDGE_TOKEN: ${BRIDGE_TOKEN}
      # Gateway-only LLM key. Deliberately separate from CODEX_API_KEY
      # (codex-worker has its own) so abuse or rotation of one does not
      # touch the other. See HARDENING.md note on gateway LLM risk.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - /opt/openclaw-stack/gateway/config:/home/node/.openclaw
      - /opt/openclaw-stack/gateway/data:/app/data
      - /opt/openclaw-stack/gateway/logs:/app/logs
    networks:
      - default
      - openclaw-internal
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bridge:
    build:
      context: /opt/openclaw-stack/bridge
      dockerfile: Dockerfile
    image: openclaw-bridge:local
    container_name: openclaw-bridge
    restart: unless-stopped
    environment:
      # Explicit allow-list; see gateway.environment for rationale.
      BRIDGE_TOKEN: ${BRIDGE_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/openclaw-stack/bridge/scripts/run-codex.sh:/scripts/run-codex.sh:ro
      - /opt/openclaw-stack/bridge/scripts/codex-preamble.txt:/scripts/codex-preamble.txt:ro
      - /opt/openclaw-stack/deploy-runner/scripts/deploy-staging.sh:/scripts/deploy-staging.sh:ro
      - /opt/openclaw-stack/db-query-runner/scripts/query-readonly.sh:/scripts/query-readonly.sh:ro
    networks:
      - openclaw-internal
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.5
    pids_limit: 64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  codex-worker:
    build:
      context: /opt/openclaw-stack/codex-worker
      dockerfile: Dockerfile
    image: openclaw-codex-worker:local
    container_name: openclaw-codex-worker
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    env_file:
      - /opt/openclaw-stack/codex-worker/.env
    volumes:
      - /opt/openclaw-stack/codex-worker/workspace:/workspace
      - /opt/openclaw-stack/codex-worker/tmp:/tmp
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    pids_limit: 512
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  deploy-runner:
    image: alpine:3.20
    container_name: openclaw-deploy-runner
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - /opt/openclaw-stack/deploy-runner/scripts:/app/scripts
      - /opt/openclaw-stack/deploy-runner/artifacts:/app/artifacts
      - /opt/openclaw-stack/deploy-runner/logs:/app/logs
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.5
    pids_limit: 64
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-query-runner:
    image: alpine:3.20
    container_name: openclaw-db-query-runner
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    volumes:
      - /opt/openclaw-stack/db-query-runner/scripts:/app/scripts
      - /opt/openclaw-stack/db-query-runner/results:/app/results
      - /opt/openclaw-stack/db-query-runner/logs:/app/logs
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 0.5
    pids_limit: 64
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
